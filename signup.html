<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - ShopEasy</title>
    <meta name="description" content="Create your ShopEasy account to track orders, save your cart, and get personalized recommendations.">
    <meta name="keywords" content="signup, create account, register, ecommerce">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <!-- Header -->
    <div id="header-placeholder"></div>

    <main class="py-5 bg-light">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <div class="card shadow-sm">
                        <div class="card-body p-4 p-md-5">
                            <div class="text-center mb-4">
                                <h1 class="h3">Create your ShopEasy account</h1>
                                <p class="text-muted mb-0">Sign up to access faster checkout, saved carts, and order tracking.</p>
                            </div>
                            <form id="signupForm" novalidate>
                                <div id="signupError" class="alert alert-danger d-none"></div>
                                <div id="signupSuccess" class="alert alert-success d-none"></div>
                                <div class="mb-3">
                                    <label for="signupFullName" class="form-label">Full Name</label>
                                    <input type="text" class="form-control" id="signupFullName" placeholder="Enter your full name" required>
                                </div>
                                <div class="mb-3">
                                    <label for="signupEmail" class="form-label">Email Address</label>
                                    <input type="email" class="form-control" id="signupEmail" placeholder="you@example.com" required>
                                </div>
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="signupPassword" class="form-label">Password</label>
                                        <input type="password" class="form-control" id="signupPassword" placeholder="Min. 6 characters" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="signupConfirmPassword" class="form-label">Confirm Password</label>
                                        <input type="password" class="form-control" id="signupConfirmPassword" placeholder="Re-enter password" required>
                                    </div>
                                </div>
                                <div class="form-check mb-4">
                                    <input class="form-check-input" type="checkbox" value="" id="termsCheck" required>
                                    <label class="form-check-label" for="termsCheck">
                                        I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
                                    </label>
                                </div>
                                <button type="submit" class="btn btn-primary w-100 btn-lg">Create Account</button>
                            </form>
                            <p class="text-center mt-4 mb-0">
                                Already have an account?
                                <button type="button" class="btn btn-link p-0 align-baseline" data-bs-toggle="modal" data-bs-target="#signInModal">
                                    Sign in
                                </button>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script type="module" src="assets/js/app.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            fetch('components/header.html')
                .then(r => r.text())
                .then(data => {
                    document.getElementById('header-placeholder').innerHTML = data;
                    setTimeout(initializeApp, 100);
                });
            fetch('components/footer.html')
                .then(r => r.text())
                .then(data => {
                    document.getElementById('footer-placeholder').innerHTML = data;
                });
        });
    </script>
</body>
</html>
